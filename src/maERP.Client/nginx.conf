server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/wasm;
    gzip_min_length 1000;

    # Entry points must never be cached — they point at the current build's
    # hashed package directory and carry runtime config. Caching them at the
    # edge means a redeploy keeps serving stale references to assets that
    # no longer exist (and Cloudflare may even cache the resulting 404s).
    location = /index.html {
        add_header Cache-Control "no-store" always;
    }
    location = /config.json {
        add_header Cache-Control "no-store" always;
    }
    location = /service-worker.js {
        add_header Cache-Control "no-store" always;
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-store" always;
    }

    # Hashed package directory — content-addressed, safe to cache forever.
    # Each deploy gets a new package_<hash>/ path, so old and new coexist
    # and clients with stale index.html simply 404 until they reload.
    location ~ ^/package_[a-f0-9]+/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Fallback rules for files outside the hashed package dir.
    location ~* \.(wasm|dll|pdb|dat|blat)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        add_header Cache-Control "public, max-age=86400" always;
    }

    # SPA fallback - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
