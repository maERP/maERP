name: maerp-mariadb

# Alternate stack — MariaDB/MySQL backend instead of postgres.
# Bring up with:  docker compose -f docker-compose.mysql.yml up -d
# Add WASM:       docker compose -f docker-compose.mysql.yml --profile wasm up -d
#
# This file is self-contained (no .env auto-loading via cli.sh). MAERP_SERVER_PORT
# and MAERP_RESTRICT_SERVER_URL are read from the shell environment if set.

services:
  server:
    image: ${DOCKER_REGISTRY-}maerp/server
    build:
      context: .
      dockerfile: src/maERP.Server/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - HTTP_PORTS=8443
      - DatabaseConfig__Provider=MySQL
      - DatabaseConfig__ConnectionString=Server=mariadb;Port=3306;Database=maerp_01;Uid=maerp;Pwd=maerp;
      - Logging__LogLevel__Default=Warning
    ports:
      - "${MAERP_SERVER_PORT:-8443}:8443"
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped

  mariadb:
    image: mariadb:11.4
    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: maerp_01
      MARIADB_USER: maerp
      MARIADB_PASSWORD: maerp
    volumes:
      - maerp-mariadb-data:/var/lib/mysql
      - ./backups/mariadb:/backups
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      timeout: 20s
      retries: 10
      interval: 10s
      start_period: 40s

  wasm:
    profiles: ["wasm"]
    image: ${DOCKER_REGISTRY-}maerp/wasm
    build:
      context: .
      dockerfile: src/maERP.Client/Dockerfile
    environment:
      - MAERP_RESTRICT_SERVER_URL=${MAERP_RESTRICT_SERVER_URL:-}
    ports:
      - "${MAERP_WASM_PORT:-8444}:80"
    networks:
      - backend
    restart: unless-stopped

volumes:
  maerp-mariadb-data:

networks:
  backend:
    driver: bridge
