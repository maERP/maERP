name: maerp-postgresql

# Alternate stack — PostgreSQL backend with the legacy 'maerp_01' database
# name (kept for parity with the other engine-specific compose files).
# For the canonical postgres setup, use docker-compose.yml together with
# ./cli.sh which supports both internal and external postgres.
#
# Bring up with:  docker compose -f docker-compose.postgresql.yml up -d
# Add WASM:       docker compose -f docker-compose.postgresql.yml --profile wasm up -d

services:
  server:
    image: ${DOCKER_REGISTRY-}maerp/server
    build:
      context: .
      dockerfile: src/maERP.Server/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - HTTP_PORTS=8443
      - DatabaseConfig__Provider=PostgreSQL
      - DatabaseConfig__ConnectionString=Host=postgresql;Port=5432;Database=maerp_01;Username=maerp;Password=maerp;
      - Logging__LogLevel__Default=Warning
    ports:
      - "${MAERP_SERVER_PORT:-8443}:8443"
    depends_on:
      postgresql:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped

  postgresql:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: maerp_01
      POSTGRES_USER: maerp
      POSTGRES_PASSWORD: maerp
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - maerp-postgresql-data:/var/lib/postgresql/data
      - ./backups/postgresql:/backups
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maerp -d maerp_01"]
      timeout: 20s
      retries: 10
      interval: 10s
      start_period: 40s

  wasm:
    profiles: ["wasm"]
    image: ${DOCKER_REGISTRY-}maerp/wasm
    build:
      context: .
      dockerfile: src/maERP.Client/Dockerfile
    environment:
      - MAERP_RESTRICT_SERVER_URL=${MAERP_RESTRICT_SERVER_URL:-}
    ports:
      - "${MAERP_WASM_PORT:-8444}:80"
    networks:
      - backend
    restart: unless-stopped

volumes:
  maerp-postgresql-data:

networks:
  backend:
    driver: bridge
