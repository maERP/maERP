name: maerp-mssql

# Alternate stack — MSSQL backend instead of postgres.
# Bring up with:  docker compose -f docker-compose.mssql.yml up -d
# Add WASM:       docker compose -f docker-compose.mssql.yml --profile wasm up -d
#
# This file is self-contained (no .env auto-loading via cli.sh). MAERP_SERVER_PORT
# and MAERP_RESTRICT_SERVER_URL are read from the shell environment if set.

services:
  server:
    image: ${DOCKER_REGISTRY-}maerp/server
    build:
      context: .
      dockerfile: src/maERP.Server/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - HTTP_PORTS=8443
      - DatabaseConfig__Provider=MSSQL
      - DatabaseConfig__ConnectionString=Server=mssql;Database=maerp_01;User Id=maerp;Password=maerp123!;TrustServerCertificate=True;
      - Logging__LogLevel__Default=Warning
    ports:
      - "${MAERP_SERVER_PORT:-8443}:8443"
    depends_on:
      mssql:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "SqlServer123!"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    volumes:
      - maerp-mssql-data:/var/opt/mssql
      - ./scripts/mssql-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./backups/mssql:/backups
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P SqlServer123! -Q 'SELECT 1' || exit 1"]
      timeout: 20s
      retries: 10
      interval: 30s
      start_period: 60s

  wasm:
    profiles: ["wasm"]
    image: ${DOCKER_REGISTRY-}maerp/wasm
    build:
      context: .
      dockerfile: src/maERP.Client/Dockerfile
    environment:
      - MAERP_RESTRICT_SERVER_URL=${MAERP_RESTRICT_SERVER_URL:-}
    ports:
      - "8444:80"
    networks:
      - backend
    restart: unless-stopped

volumes:
  maerp-mssql-data:

networks:
  backend:
    driver: bridge
