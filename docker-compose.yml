name: maerp

services:
  server:
    profiles: ["server"]
    image: ${DOCKER_REGISTRY-}maerp/server
    container_name: maerp-server
    build:
      context: .
      dockerfile: src/maERP.Server/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - HTTP_PORTS=8443
      - DatabaseConfig__Provider=Sqlite
      - DatabaseConfig__ConnectionString=Data Source=/app/data/maerp.db
      - Logging__LogLevel__Default=Warning
    ports:
      - "8443:8443"
    volumes:
      - maerp-data:/app/data
    depends_on:
      - grafana-agent
    networks:
      - backend
    restart: unless-stopped

  wasm:
    profiles: ["wasm"]
    image: ${DOCKER_REGISTRY-}maerp/wasm
    container_name: maerp-wasm
    build:
      context: .
      dockerfile: src/maERP.Client/Dockerfile
    environment:
      - MAERP_SERVER_BASE_URL=${MAERP_SERVER_BASE_URL:-http://localhost:8443}
    ports:
      - "8444:80"
    networks:
      - backend
    restart: unless-stopped

  grafana-agent:
    profiles: ["server"]
    image: grafana/agent:latest
    container_name: maerp-grafana-agent
    entrypoint:
      - /bin/grafana-agent
      - -server.http.address=0.0.0.0:12345
      - -config.file=/etc/agent-config/agent.yaml
      - -metrics.wal-directory=/tmp/agent/wal
      - -enable-features=integrations-next
      - -config.expand-env
      - -config.enable-read-api
    environment:
      HOSTNAME: grafana-agent
      REMOTE_WRITE_HOST: mimir:9009
      POSTGRES_HOST: postgres:5432
    ports:
      - "12345:12345"
    volumes:
      - ./grafana-agent/agent.yaml:/etc/agent-config/agent.yaml:ro
      - grafana-agent-wal:/tmp/agent/wal
    networks:
      - backend
    restart: unless-stopped

volumes:
  maerp-data:
  grafana-agent-wal:

networks:
  backend:
    driver: bridge
