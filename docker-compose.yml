name: maerp

services:
  server:
    profiles: ["server"]
    image: ${DOCKER_REGISTRY-}maerp/server
    container_name: maerp-server
    build:
      context: .
      dockerfile: src/maERP.Server/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - HTTP_PORTS=8443
      - DatabaseConfig__Provider=PostgreSQL
      - DatabaseConfig__ConnectionString=Host=postgres;Port=5432;Database=maerp;Username=maerp;Password=maerp;
      - Logging__LogLevel__Default=Warning
    ports:
      - "8443:8443"
    volumes:
      - maerp-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      grafana-agent:
        condition: service_started
    networks:
      - backend
    restart: unless-stopped

  postgres:
    profiles: ["server"]
    image: postgres:16-alpine
    container_name: maerp-postgres
    environment:
      POSTGRES_DB: maerp
      POSTGRES_USER: maerp
      POSTGRES_PASSWORD: maerp
      PGDATA: /var/lib/postgresql/data/pgdata
    # Postgres is reachable only inside the 'backend' network — not published to the host.
    # Uncomment the next two lines if you need to connect from the host (e.g. psql, backup tools).
    # ports:
    #   - "5432:5432"
    volumes:
      - maerp-postgres-data:/var/lib/postgresql/data
      - ./backups/postgresql:/backups
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maerp -d maerp"]
      timeout: 20s
      retries: 10
      interval: 10s
      start_period: 40s

  wasm:
    profiles: ["wasm"]
    image: ${DOCKER_REGISTRY-}maerp/wasm
    container_name: maerp-wasm
    build:
      context: .
      dockerfile: src/maERP.Client/Dockerfile
    environment:
      - MAERP_SERVER_BASE_URL=${MAERP_SERVER_BASE_URL:-http://localhost:8443}
    ports:
      - "8444:80"
    networks:
      - backend
    restart: unless-stopped

  grafana-agent:
    profiles: ["server"]
    image: grafana/agent:latest
    container_name: maerp-grafana-agent
    entrypoint:
      - /bin/grafana-agent
      - -server.http.address=0.0.0.0:12345
      - -config.file=/etc/agent-config/agent.yaml
      - -metrics.wal-directory=/tmp/agent/wal
      - -enable-features=integrations-next
      - -config.expand-env
      - -config.enable-read-api
    environment:
      HOSTNAME: grafana-agent
      REMOTE_WRITE_HOST: mimir:9009
      POSTGRES_HOST: postgres:5432
    ports:
      - "12345:12345"
    volumes:
      - ./grafana-agent/agent.yaml:/etc/agent-config/agent.yaml:ro
      - grafana-agent-wal:/tmp/agent/wal
    networks:
      - backend
    restart: unless-stopped

volumes:
  maerp-data:
  maerp-postgres-data:
  grafana-agent-wal:

networks:
  backend:
    driver: bridge
